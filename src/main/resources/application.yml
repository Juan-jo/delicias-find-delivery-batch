quarkus:
  http:
    host-enabled: false
  devservices:
    enabled: false
  datasource:
    db-kind: postgresql
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    jdbc:
      url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
      min-size: 2
      max-size: 20
  hibernate-orm:
    database:
      generation: none
    second-level-caching-enabled: false
